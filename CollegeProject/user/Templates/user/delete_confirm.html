<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f6fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #fff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 400px;
    width: 100%;
}

/* Heading */
h2 {
    margin-bottom: 25px;
    color: #333;
}

/* Buttons */
button {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    margin-right: 10px;
    transition: 0.3s;
}

button:hover {
    background: #c0392b;
}

/* Cancel link */
a {
    text-decoration: none;
    background: #bdc3c7;
    color: #2c3e50;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 15px;
    transition: 0.3s;
}

a:hover {
    background: #95a5a6;
}
</style>

<div class="container">
    <h2>Are you sure you want to delete {{ user.username }}?</h2>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <br>

    <a href="{% url 'user_page' %}">Cancel</a>
</div>
