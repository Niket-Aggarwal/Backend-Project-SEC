<nav class="navbar">
  <a href="{% url 'booking' %}">
    <div class="logo"><span>H</span>ang<span>O</span>ut</div>
  </a>


  <div class="profile-container">
    <button class="profile-btn" id="profileBtn">👤</button>
    <div class="dropdown-menu" id="dropdownMenu">
      <a href="{% url 'restaurant_logout' %}">Logout</a>
      <a href="{% url 'delete_restaurant' %}" class="delete">Delete Account</a>
    </div>
  </div>
</nav>

<style>
  a {
    text-decoration: none;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  }
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 16px 40px;
    background: linear-gradient(90deg, #ff6b6b, #ff8e53);
    color: white;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .logo {
    font-size: 38px;
    font-weight: 800;
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    letter-spacing: 1px;
    color: white;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.15);
    flex-shrink: 0;
  }
  .logo span {
    color: #f5dd95;
  }
  .search-form {
    flex: 1;
    max-width: 650px;
  }
  .search {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
  }
  .search:focus {
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
  }
  .profile {
    font-size: 24px;
    cursor: pointer;
    background-color: rgba(255, 255, 255, 0.2);
    padding: 8px 12px;
    border-radius: 50%;
    transition: 0.3s;
    flex-shrink: 0;
  }
  .profile:hover {
    background-color: rgba(255, 255, 255, 0.35);
  }
  .profile-container {
    position: relative;
    display: inline-block;
  }
  .profile-btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
  }
  .profile-btn:hover {
    background: rgba(255, 255, 255, 0.35);
  }
  .dropdown-menu {
    position: absolute;
    top: 55px;
    right: 0;
    background: white;
    width: 180px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    display: none;
    z-index: 1000;
  }
  .dropdown-menu.show {
    display: block;
  }
  .dropdown-menu a {
    display: block;
    padding: 12px 15px;
    text-decoration: none;
    color: #333;
    font-size: 15px;
    transition: 0.3s;
  }
  .dropdown-menu a:hover {
    background: #f3f4f6;
  }
  .dropdown-menu a.delete {
    color: red;
  }
  .dropdown-menu a.delete:hover {
    background: #ffe5e5;
  }
</style>

<!-- JavaScript for profile icon options (logout,delete)-->
<script>
  const profileBtn = document.getElementById("profileBtn");
  const dropdownMenu = document.getElementById("dropdownMenu");
  profileBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    dropdownMenu.classList.toggle("show");
  });
  document.addEventListener("click", function () {
    dropdownMenu.classList.remove("show");
  });
</script>
