{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hangout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'Logo/image.png' %}">
    <style>
        body{
            margin: 0;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
        }
        main {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        h1{
            text-align: center;
        }
        .container {
            width: 950px;
            height: 550px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            overflow: hidden;
        }
        .left-panel {
            width: 50%;
            background: linear-gradient(135deg, #fc8269, #dd2476);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        .slide{
            position: absolute;
            width: 35%;
            height: 87%;
            background: linear-gradient(135deg, #fc8269, #dd2476);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: transform 0.6s ease-in-out;
            z-index: 10;
        }
        .slide button{
            width: 140px;
            background: white;
            color: #2e7d32;
            margin: 10px 0;
            border: none;
        }
        .slide button:hover{
            background: #d436bf;
        }
        .left-panel h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .right-panel {
            background-color: white;
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .btn {
            width: 80%;
            padding: 12px;
            border: 2px solid #ff512f;
            border-radius: 25px;
            background: transparent;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            color: red;
        }
        .btn:hover {
            background: #ff512f;
            color: white;
        }
        input {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
        }
        .submit-btn {
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #ff512f;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
    {% block style %}
    {% endblock %}
</head>
<body>
    <h1>Hangout</h1>
    <main>
    {% block content %}
    {% endblock %}
    </main>
    {% block script %}
    {% endblock %}
</body>
</html>
