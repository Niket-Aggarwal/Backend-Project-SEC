<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hero section</title>
    <style>
        .hero {
            text-align: center;
            padding: 60px 20px;
            background-color: #ffecec;
        }

        .hero h1 {
            font-size: 36px;
        }

        .hero p {
            margin: 15px 0;
        }

        .hero button {
            padding: 10px 20px;
            background-color: #ff5a5f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <section class="hero">
        <h1>Book Your Perfect HangOut</h1>
        <p>Reserve restaurant seats with or without food for birthdays, anniversaries & more</p>
        <button>Explore Restaurants</button>
    </section>

</body>

</html>
