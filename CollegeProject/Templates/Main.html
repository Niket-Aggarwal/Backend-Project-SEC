{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HangOut{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'Logo/image.png' %}">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }
        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        footer {
            margin-top: auto;
        }
        .restaurants {
            display: flex;
            gap: 70px;
            justify-content: space-evenly;
        }
        .card {
            border: 1px solid gray;
            padding: 10px;
            width: 200px;
            text-align: center;
            background: #f5f5f5;
        }
        .card img {
            width: 100%;
        }
        .link {
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>
    <div class="page-container">
        {%include 'Navbar.html'%}
        {%block content%}

        {%endblock%}
        {%include 'footer.html'%}
    </div>
</body>

</html>
