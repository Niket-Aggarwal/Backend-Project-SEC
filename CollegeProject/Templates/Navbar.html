<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #ff5a5f;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .search {
            width: 40%;
            padding: 8px;
            border-radius: 5px;
            /* border: none; */
        }

        .profile {
            font-size: 22px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="logo">HangOut</div>

        <input type="text" class="search" placeholder="Search restaurants...">

        <div class="profile">👤</div>
    </nav>
</body>

</html>
